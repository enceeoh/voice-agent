services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
      POSTGRES_DB: voice
    ports:
      - "5433:5432"   # 5433 host-side: prod-agent's pgvector owns 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
